<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seria el menú</title>
    <link rel="stylesheet" href="/Bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/CSS/Otros.css">
    <link rel="stylesheet" href="/Bootstrap/bt-icons/bootstrap-icons.min.css">
</head>
<body>
    <!-- cabecera -->
    <!-- <div class="container">
        <article>
        <aside class="sidebar">
            <div class="SideOption" type="button">Opción 1</div>
            <div class="SideOption" type="button">Opción 2</div>
            <div class="SideOption" type="button">Opción 3</div>
        </aside>
    </article>
    </div> -->
    <!-- Menu de opciones -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top" >
        <div class="container-fluid">
            <a href="#" class="navbar-brand text-info fw-semibold fs-4"><i class="bi bi-house-door"></i> INICIO</a>
            <!-- nav button -->
            <button 
                class="navbar-toggler" 
                type="button" 
                data-bs-toggle="offcanvas" 
                data-bs-target="#menuLateral"
                aria-controls="menuLateral"
                aria-label="Abrir menú">
                <span class="navbar-toggler-icon"></span>
            </button>
        <!-- aca termina el nav button -->
        
        <!-- offcanvas creamos aca -->
        <section class="offcanvas offcanvas-start bg-dark" id="menuLateral" tabindex="-1" with="20%"
        aria-labelledby="menuLateralLabel">
            <div class="offcanvas-header" data-bs-theme="dark">
                <h5 class="fs-4 text-info">Menu</h5>
                <button type="button" class="btn-close" aria-label="Close" data-bs-dismiss="offcanvas "></button>
            </div>
            <div></div>
        </section>
        <!-- offcanvas aqui termina -->
        </div>
    </nav>

    <script src="/Bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
